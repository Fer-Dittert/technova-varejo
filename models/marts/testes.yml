version: 2

models:

  - name: dim_clientes
    description: "Dimensão de clientes contendo informações de localização e identificação."
    columns:
      - name: id_cliente
        description: "Identificador único do cliente."
        data_tests:
          - not_null
          - unique

  - name: dim_produtos
    description: "Dimensão de produtos com atributos físicos e categoria."
    columns:
      - name: id_produto
        description: "Identificador único do produto."
        data_tests:
          - not_null
          - unique

  - name: dim_vendedores
    description: "Dimensão de vendedores com localização."
    columns:
      - name: id_vendedor
        description: "Identificador único do vendedor."
        data_tests:
          - not_null
          - unique

  - name: dim_status_pedido
    description: "Dimensão de status do pedido, transformando valores textuais em chave numérica."
    columns:
      - name: id_status_pedido
        description: "Chave substituta do status do pedido."
        data_tests:
          - not_null
          - unique

  - name: dim_data
    description: "Dimensão de datas contendo atributos temporais para análise."
    columns:
      - name: id_data
        description: "Data no formato date."
        data_tests:
          - not_null
          - unique

  - name: fato_vendas
    description: "Tabela fato de vendas com granularidade por item de pedido."
    columns:
      - name: id_cliente
        description: "Chave estrangeira para dimensão de clientes."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_clientes')
                field: id_cliente

      - name: id_produto
        description: "Chave estrangeira para dimensão de produtos."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_produtos')
                field: id_produto

      - name: id_vendedor
        description: "Chave estrangeira para dimensão de vendedores."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_vendedores')
                field: id_vendedor

      - name: id_status_pedido
        description: "Chave estrangeira para dimensão de status."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_status_pedido')
                field: id_status_pedido

      - name: id_data
        description: "Chave estrangeira para dimensão de datas."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_data')
                field: id_data